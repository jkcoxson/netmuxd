name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            windows_dll_dir: amd64
          - target: i686-pc-windows-msvc
            os: windows-latest
            windows_dll_dir: x86
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            windows_dll_dir: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Add LLVM to PATH (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LLVM\bin"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ hashFiles('vendor-manifest.toml') }}
      # Cache the extracted vendor/ tree so we don't re-download libusbK
      # + libwdi binaries on every run. Keyed by manifest content so
      # bumping the version invalidates automatically.
      - name: Cache vendor bundle
        if: contains(matrix.target, 'windows')
        uses: actions/cache@v4
        with:
          path: |
            vendor/libusbK/lib
            vendor/libusbK/dll
            vendor/libwdi/lib
            vendor/.vendor-stamp-*
          key: vendor-${{ matrix.target }}-${{ hashFiles('vendor-manifest.toml') }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin netmuxd
      - name: Stage artifacts (Windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/netmuxd.exe" -Destination dist/
          Copy-Item "vendor/libusbK/dll/${{ matrix.windows_dll_dir }}/libusbK.dll" -Destination dist/
          Copy-Item "vendor/libusbK/dll/${{ matrix.windows_dll_dir }}/libusb0.dll" -Destination dist/
      - name: Stage artifacts (non-Windows)
        if: "!contains(matrix.target, 'windows')"
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/netmuxd dist/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netmuxd-${{ matrix.target }}
          path: dist/
          if-no-files-found: error
  build-packages-ubuntu:
    runs-on:  ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: ubuntu-jammy-x86_64
            build_target: x86_64-unknown-linux-gnu
            ubuntu_codename: jammy
            os: ubuntu-22.04
            deb_arch: amd64
          - target: ubuntu-jammy-aarch64
            build_target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            ubuntu_codename: jammy
            deb_arch: arm64
          - target: ubuntu-noble-x86_64
            build_target: x86_64-unknown-linux-gnu
            ubuntu_codename: noble
            os: ubuntu-24.04
            deb_arch: amd64
          - target: ubuntu-noble-aarch64
            build_target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            ubuntu_codename: noble
            deb_arch: arm64
          - target: ubuntu-resolute-x86_64
            build_target: x86_64-unknown-linux-gnu
            os: ubuntu-26.04
            ubuntu_codename: resolute
            deb_arch: amd64
          - target: ubuntu-resolute-aarch64
            build_target: aarch64-unknown-linux-gnu
            os: ubuntu-26.04
            ubuntu_codename: resolute
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: |
          rustup target add ${{ matrix.build_target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libavahi-compat-libdnssd-dev

          if [ "${{ matrix.build_target }}" = "aarch64-unknown-linux-gnu" ]; then
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu
          fi

      - name: Build netmuxd
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          cargo build --release --target ${{ matrix.build_target }}

      - name: Prepare .deb package
        run: |
          rm -rf package/deb

          mkdir -p package/deb/usr/bin
          mkdir -p package/deb/DEBIAN
          mkdir -p package/deb/lib/systemd/system

          install -m 0755 target/${{ matrix.build_target }}/release/netmuxd package/deb/usr/bin/netmuxd

          install -m 0644 package/ubuntu/netmuxd.service package/deb/lib/systemd/system/netmuxd.service
          install -m 0755 package/ubuntu/postinst package/deb/DEBIAN/postinst
          install -m 0755 package/ubuntu/prerm package/deb/DEBIAN/prerm
          install -m 0755 package/ubuntu/postrm package/deb/DEBIAN/postrm

      - name: Normalize version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      
      - name: Select Debian dependencies
        id: deb_deps
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.ubuntu_codename }}" in
            jammy|noble)
              IMOBILEDEVICE_DEP="libimobiledevice6"
              ;;
            resolute)
              IMOBILEDEVICE_DEP="libimobiledevice-1.0-6"
              ;;
            *)
              echo "Unsupported Ubuntu codename: ${{ matrix.ubuntu_codename }}" >&2
              exit 1
              ;;
          esac

          DEPS="libusb-1.0-0, ${IMOBILEDEVICE_DEP}, libavahi-compat-libdnssd1, avahi-daemon, libcap2-bin"

          echo "deps=${DEPS}" >> "$GITHUB_OUTPUT"
          echo "Selected dependencies: ${DEPS}"

      - name: Build deb package
        id: build_deb
        uses: jiro4989/build-deb-action@v4
        with:
          package: netmuxd
          package_root: package/deb
          version: ${{ steps.version.outputs.version }}
          maintainer: "jkcoxson"
          arch: ${{ matrix.deb_arch }}
          depends: ${{ steps.deb_deps.outputs.deps }}
          homepage: "https://github.com/jkcoxson/netmuxd"
          conflicts: "usbmuxd"
          replaces: "usbmuxd"
          section: "net"
          priority: "optional"
          desc: "Network usbmuxd companion for iOS devices."
          compress_type: "xz"

      - name: Rename deb package
        run: |
          mv "${{ steps.build_deb.outputs.file_name }}" "netmuxd_${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}_${{ matrix.ubuntu_codename }}.deb"

      - name: Upload deb to existing GitHub Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netmuxd-${{ matrix.deb_arch }}-${{ matrix.ubuntu_codename }}
          path: "netmuxd_${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}_${{ matrix.ubuntu_codename }}.deb"
          if-no-files-found: error