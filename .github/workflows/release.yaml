name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # (required) GitHub token for creating GitHub Releases.
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            windows_dll_dir: amd64
          - target: i686-pc-windows-msvc
            os: windows-latest
            windows_dll_dir: x86
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            windows_dll_dir: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # `aws-lc-sys` needs `clang-cl` for the ARM64 cross-compile.
      # windows-latest ships LLVM at this path but not on PATH.
      - name: Add LLVM to PATH (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LLVM\bin"
      - name: Cache vendor bundle
        if: contains(matrix.target, 'windows')
        uses: actions/cache@v4
        with:
          path: |
            vendor/libusbK/lib
            vendor/libusbK/dll
            vendor/libwdi/lib
            vendor/.vendor-stamp-*
          key: vendor-${{ matrix.target }}-${{ hashFiles('vendor-manifest.toml') }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (required) Comma-separated list of binary names (non-extension portion of filename) to build and upload.
          # Note that glob pattern is not supported yet.
          bin: netmuxd
          # (optional) Target triple, default is host triple.
          # This is optional but it is recommended that this always be set to
          # clarify which target you are building for if macOS is included in
          # the matrix because GitHub Actions changed the default architecture
          # of macos-latest since macos-14.
          target: ${{ matrix.target }}
          # (optional) Bundle the libusbK runtime DLLs into the
          # release zip on Windows. They're loaded dynamically by
          # netmuxd.exe and need to be next to it. build.rs downloads
          # them into vendor/ during the build, and the action flattens
          # included files to their basename, so they land beside the
          # binary in the archive. Empty for non-Windows targets.
          include: ${{ matrix.windows_dll_dir && format('vendor/libusbK/dll/{0}/libusbK.dll,vendor/libusbK/dll/{0}/libusb0.dll', matrix.windows_dll_dir) || '' }}
          # (optional) On which platform to distribute the `.tar.gz` file.
          # [default value: unix]
          # [possible values: all, unix, windows, none]
          tar: unix
          # (optional) On which platform to distribute the `.zip` file.
          # [default value: windows]
          # [possible values: all, unix, windows, none]
          zip: windows
          # (required) GitHub token for uploading assets to GitHub Releases.
          token: ${{ secrets.GITHUB_TOKEN }}
  upload-packages-ubuntu:
    needs: create-release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libavahi-compat-libdnssd-dev

      - name: Build netmuxd
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare .deb package
        run: |
          rm -rf package/deb

          mkdir -p package/deb/usr/bin
          mkdir -p package/deb/DEBIAN
          mkdir -p package/deb/lib/systemd/system

          install -m 0755 target/${{ matrix.target }}/release/netmuxd package/deb/usr/bin/netmuxd

          install -m 0644 package/ubuntu/netmuxd.service package/deb/lib/systemd/system/netmuxd.service
          install -m 0755 package/ubuntu/postinst package/deb/DEBIAN/postinst
          install -m 0755 package/ubuntu/prerm package/deb/DEBIAN/prerm
          install -m 0755 package/ubuntu/postrm package/deb/DEBIAN/postrm

      - name: Normalize version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build deb package
        id: build_deb
        uses: jiro4989/build-deb-action@v4
        with:
          package: netmuxd
          package_root: package/deb
          version: ${{ steps.version.outputs.version }}
          maintainer: "jkcoxson"
          arch: ${{ matrix.deb_arch }}
          depends: "libusb-1.0-0, usbmuxd, libimobiledevice6, libavahi-compat-libdnssd1, avahi-daemon, libcap2-bin"
          homepage: "https://github.com/jkcoxson/netmuxd"
          section: "net"
          priority: "optional"
          desc: "Network usbmuxd companion for iOS devices."
          compress_type: "xz"

      - name: Upload deb to existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.build_deb.outputs.file_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber